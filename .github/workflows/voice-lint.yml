name: Voice lint

# Voice / microcopy lint — enforces studio-language.jsx §11 ("Voice &
# microcopy"): no pictographic emoji, no exclamation points in UI copy, and no
# §11 hype/banned words (successfully, amazing, oops, seamless, powerful,
# generate, produce, effortless, revolutionary). It honours §08 ("Iconography")
# — the drafted glyph set (⌬ ◇ ↗ ⚡ ◐ ↻ …) is the language and is NEVER flagged
# as emoji.
#
# STRICT GATE. The repo's live UI copy is now §11-clean (voice findings driven to
# zero), so this job fails the build on ANY voice finding — the bar is a hard
# gate, not advisory. This job:
#   * RUNS the lint over the real UI copy with `--strict`; any emoji / "!" / hype
#     finding fails the build, and every finding is still written into the run's
#     job summary (visible on the PR's Checks tab);
#   * DOES run the lint's own test suite as a real gate — if tools/voice_lint.py
#     regresses (stops catching a planted violation, or starts false-flagging
#     iconography), THAT fails the build too.
#
# A justified exception goes in tools/voice_lint_allow.txt (keep it short) —
# never by weakening the gate back to advisory.

on:
  push:
    branches: [main]
    paths:
      - 'app/web_ui/**'
      - 'tools/voice_lint.py'
      - 'tools/voice_lint_allow.txt'
      - 'tests/test_voice_lint.py'
      - '.github/workflows/voice-lint.yml'
  pull_request:
    paths:
      - 'app/web_ui/**'
      - 'app/**/*.py'
      - 'tools/voice_lint.py'
      - 'tools/voice_lint_allow.txt'
      - 'tests/test_voice_lint.py'
      - '.github/workflows/voice-lint.yml'
  workflow_dispatch:

# Cancel superseded runs on the same PR ref.
concurrency:
  group: voice-lint-${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  voice-lint:
    name: Voice / microcopy (strict)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      # The lint + its tests are pure-stdlib (no third-party deps); only pytest
      # is needed to run the suite. No app/requirements install required.
      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      # ─── 1. Lint the real copy — STRICT (fails the build on any finding) ───
      - name: Run voice lint (strict gate)
        id: lint
        env:
          PYTHONUTF8: '1'
          PYTHONIOENCODING: 'utf-8'
        run: |
          echo '## Voice / microcopy lint — studio-language §11' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo 'Strict gate: any finding fails the build.' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          # --strict => exit 1 on any finding. Capture the code through the tee
          # (PIPESTATUS), still write the summary, then fail the step on findings.
          set +e
          python tools/voice_lint.py --all --strict app/web_ui | tee voice_lint_report.txt
          rc=${PIPESTATUS[0]}
          set -e
          count=$(grep -cE ': (emoji|exclamation|banned-word):' voice_lint_report.txt || true)
          echo "finding_count=${count}" >> "$GITHUB_OUTPUT"
          {
            echo '```'
            cat voice_lint_report.txt
            echo '```'
            echo ''
            echo "**${count} finding(s).** Rules: no emoji · no \"!\" in UI copy · no hype words."
            echo "Iconography (§08 glyphs ⌬ ◇ ↗ ⚡ ◐ ↻ …) is the language and is not flagged."
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$rc"

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: voice-lint-report
          path: voice_lint_report.txt
          if-no-files-found: ignore

      # ─── 2. The lint's OWN tests — REAL gate (this can fail the build) ─────
      # Keeps the detector correct (catches planted violations, never flags
      # §08 iconography) even while its findings over real copy are advisory.
      - name: Run voice-lint tests
        env:
          PYTHONUTF8: '1'
          PYTHONIOENCODING: 'utf-8'
        run: python -m pytest tests/test_voice_lint.py -v
