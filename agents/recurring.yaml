      "interval_minutes": 1440,
      "priority": 60,
      "inputs": {
        "context_files": [
          "DEVELOPMENT_LOG.md",
          "VERSION"
        ]
      }
    },
    {
      "id": "eng-perf-fix-3-draft",
      "department": "eng",
      "title": "Draft a patch for perf fix #3 (background reachability ping)",
      "instructions": "Per docs/PERF_AUDIT.md item #4, the connector reachability ping at app/chat_window.py _host_reachable runs synchronously on the UI thread with a 1s timeout. Draft a unified diff patch that: (a) caches the reachability result for 30 seconds keyed by host, (b) keeps the first call fast and lets cache hits return in <1ms. Include a brief rationale in a top comment. Output one patch only. If the file has changed since the audit was written, output 'NEEDS CLARIFICATION:' followed by the conflict.",
      "interval_minutes": 10080,
      "priority": 40,
      "inputs": {
        "context_files": [
          "app/chat_window.py",
          "docs/PERF_AUDIT.md"
        ]
      }
    },
    {
      "id": "telemetry-friction-scan",
      "department": "telemetry",
      "title": "Friction report — top failing Skills + retried prompts",
      "instructions": "Read agents/outputs/_index/skills.json (regenerated by the Skill exporter before each cycle). For each Skill with runs >= 5: failure_rate = failures / runs. Build a Markdown brief titled '# Friction report — <ISO date>'. Section 1: top 5 Skills by failure_rate × runs (table: skill_id | name | runs | failures | failure_rate | last_error). Section 2: top 5 by retries (same shape). Section 3: per-dept time burn from agents/logs/token_meter.json. Section 4: 3 imperative bullets — what should the next sprint focus on. If no Skill has runs >= 5, output 'no signal yet'.",
      "interval_minutes": 240,
      "priority": 35,
      "inputs": {
        "context_files": [
          "agents/outputs/_index/skills.json",
          "agents/logs/token_meter.json"
        ]
      }
    },
    {
      "id": "backlog-from-friction",
      "department": "backlog",
      "title": "Draft backlog tasks from latest friction report",
      "instructions": "Find the most recent file under agents/outputs/telemetry/. Convert each entry in its 'top failing Skills' section into ONE task YAML block (eng dept) and each entry in 'top retried prompts' into ONE QA task. Skip Skills already covered by an open task in agents/tasks/. Output: list of YAML blocks, one per line, fenced as ```yaml ... ```. If the friction report says 'no signal yet', output 'NO_BACKLOG_THIS_CYCLE'.",
      "interval_minutes": 360,
      "priority": 45,
      "inputs": {
        "context_files": [
          "agents/outputs/telemetry/"
        ]
      }
    },
    {
      "id": "watcher-peer-issues",
