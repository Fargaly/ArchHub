name: Voice lint

# Voice / microcopy lint — enforces studio-language.jsx §11 ("Voice &
# microcopy"): no pictographic emoji, no exclamation points in UI copy, and no
# §11 hype/banned words (successfully, amazing, oops, seamless, powerful,
# generate, produce, effortless, revolutionary). It honours §08 ("Iconography")
# — the drafted glyph set (⌬ ◇ ↗ ⚡ ◐ ↻ …) is the language and is NEVER flagged
# as emoji.
#
# ADVISORY-FIRST (deliberate). The repo's live copy already carries pre-existing
# §11 findings, so failing the build on them today would block every PR for
# reasons unrelated to the change at hand. This job therefore:
#   * RUNS the lint over the real UI copy and writes every finding into the run's
#     job summary (visible on the PR's Checks tab) — the voice bar becomes
#     observable, no one has to remember to run it locally;
#   * does NOT fail the build on lint findings (the lint step is `--advisory`,
#     always exit 0);
#   * DOES run the lint's own test suite as a real gate — if tools/voice_lint.py
#     regresses (stops catching a planted violation, or starts false-flagging
#     iconography), THAT fails the build. The detector must stay correct even
#     while its findings are advisory.
#
# Flip the "report" step to `--strict` (and drop `|| true` safety) once the copy
# is clean, to turn the voice bar into a hard gate.

on:
  push:
    branches: [main]
    paths:
      - 'app/web_ui/**'
      - 'tools/voice_lint.py'
      - 'tools/voice_lint_allow.txt'
      - 'tests/test_voice_lint.py'
      - '.github/workflows/voice-lint.yml'
  pull_request:
    paths:
      - 'app/web_ui/**'
      - 'app/**/*.py'
      - 'tools/voice_lint.py'
      - 'tools/voice_lint_allow.txt'
      - 'tests/test_voice_lint.py'
      - '.github/workflows/voice-lint.yml'
  workflow_dispatch:

# Cancel superseded runs on the same PR ref.
concurrency:
  group: voice-lint-${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  voice-lint:
    name: Voice / microcopy (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      # The lint + its tests are pure-stdlib (no third-party deps); only pytest
      # is needed to run the suite. No app/requirements install required.
      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      # ─── 1. Lint the real copy — ADVISORY (never fails the build) ──────────
      - name: Run voice lint (advisory report)
        id: lint
        env:
          PYTHONUTF8: '1'
          PYTHONIOENCODING: 'utf-8'
        run: |
          echo '## Voice / microcopy lint — studio-language §11' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo 'Advisory: findings are reported but do not fail the build yet.' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          # --advisory => always exit 0. Capture findings for the summary.
          python tools/voice_lint.py --all --advisory app/web_ui | tee voice_lint_report.txt
          count=$(grep -cE ': (emoji|exclamation|banned-word):' voice_lint_report.txt || true)
          echo "finding_count=${count}" >> "$GITHUB_OUTPUT"
          {
            echo '```'
            cat voice_lint_report.txt
            echo '```'
            echo ''
            echo "**${count} finding(s).** Rules: no emoji · no \"!\" in UI copy · no hype words."
            echo "Iconography (§08 glyphs ⌬ ◇ ↗ ⚡ ◐ ↻ …) is the language and is not flagged."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: voice-lint-report
          path: voice_lint_report.txt
          if-no-files-found: ignore

      # ─── 2. The lint's OWN tests — REAL gate (this can fail the build) ─────
      # Keeps the detector correct (catches planted violations, never flags
      # §08 iconography) even while its findings over real copy are advisory.
      - name: Run voice-lint tests
        env:
          PYTHONUTF8: '1'
          PYTHONIOENCODING: 'utf-8'
        run: python -m pytest tests/test_voice_lint.py -v
