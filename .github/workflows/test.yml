name: Tests

# Cross-platform test matrix. Runs the top-level `tests/` suite and the
# `cloud_backend/tests/` suite on Windows + macOS + Linux for every push
# to main and every pull request. Python 3.14 to match production.
#
# Win32 COM tests (Outlook) are skipped on macOS/Linux via
# `pytest.mark.skipif(sys.platform != 'win32', ...)` at the test module
# level — pywin32 is not installed on non-Windows runners.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same PR ref so we don't burn minutes on
# stale commits. `main` pushes use the SHA so each lands independently.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        # 3.13 pinned: PyO3 (pydantic-core's Rust core) caps at 3.13.
        # Local dev boxes can run 3.14; CI cannot until pydantic-core
        # ships against PyO3 0.23+. Bump alongside build-macos /
        # build-linux when that lands.
        python-version: ['3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # PyQt6 on Linux needs xcb + EGL system libs even for headless
      # tests — Qt resolves a platform plugin during QApplication init.
      - name: Install Qt6 runtime libs (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0 libegl1 \
            libfontconfig1 libdbus-1-3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            app/requirements.txt
            cloud_backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt -r cloud_backend/requirements.txt
          python -m pip install pytest pytest-asyncio

      # Offscreen platform lets PyQt6 init QApplication without a
      # display server — required for any test that imports a widget
      # at module load.
      - name: Run app test suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v

      - name: Run cloud backend test suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest cloud_backend/tests/ -v
