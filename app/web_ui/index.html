<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ArchHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!-- Founder 2026-05-25: NON-BLOCKING font load. Was hanging the page
     white when network/firewall couldn't reach fonts.googleapis.com
     (Kaspersky 21.22 ghost + DLL hook + new outbound block tested).
     The `media=print` trick lets the page render with fallback fonts
     (Georgia / system-ui / monospace) immediately, then swaps when
     the real font sheet arrives. `noscript` keeps it for non-JS. -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Architects+Daughter&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet" media="print" onload="this.media='all'; this.onload=null;" />
<noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Architects+Daughter&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" /></noscript>
<style>
  html, body {
    margin:0; padding:0; height:100%; width:100%;
    background:#0e0e11; font-family:'Inter',system-ui,sans-serif; color:#e6e3dd;
    overflow:hidden;
  }
  #root { height:100vh; width:100vw; overflow:hidden; }
  *, *::before, *::after { box-sizing: border-box; }
  .ah-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  .ah-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 3px; }
  .ah-scroll::-webkit-scrollbar-track { background: transparent; }
  /* Splash — "Minimal mark" (founder pick 2026-05-22): the icon only,
     no wordmark, a soft pulse + one thin sweeping progress line.
     Calm, premium, no text. */
  #__archhub_splash {
    position: fixed; inset: 0; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    background: #0e0e11; z-index: 9999; pointer-events: none;
    transition: opacity 280ms ease;
  }
  #__archhub_splash .mark {
    width: 104px; height: 104px;
    image-rendering: -webkit-optimize-contrast;
    animation: archhubSplashPulse 1.8s ease-in-out infinite;
    filter: drop-shadow(0 4px 28px rgba(232,116,58,0.22));
  }
  @keyframes archhubSplashPulse {
    0%, 100% { opacity: 0.78; transform: scale(0.97); }
    50%      { opacity: 1;    transform: scale(1.0); }
  }
  /* Thin sweeping progress line, bottom edge. Indeterminate — it
     signals "working", not a percentage. */
  #__archhub_splash .sweep {
    position: absolute; left: 0; bottom: 0;
    height: 2px; width: 100%;
    overflow: hidden;
    background: rgba(232,116,58,0.10);
  }
  #__archhub_splash .sweep::before {
    content: ''; position: absolute; top: 0; height: 100%;
    width: 34%; border-radius: 2px;
    background: linear-gradient(90deg,
      rgba(232,116,58,0) 0%, #e8743a 50%, rgba(232,116,58,0) 100%);
    animation: archhubSplashSweep 1.15s ease-in-out infinite;
  }
  @keyframes archhubSplashSweep {
    0%   { left: -34%; }
    100% { left: 100%; }
  }
  #__archhub_splash.fade { opacity: 0; }
</style>
</head>
<body>
<div id="__archhub_splash">
  <img class="mark" src="archhub.png" alt=""/>
  <div class="sweep"></div>
</div>
<div id="root"></div>

<!-- QtWebChannel bridge — load FIRST so window.archhub is set before React boots. -->
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script>
  window.__archhub_ready = false;
  window.archhubReady = new Promise((resolve) => {
    if (typeof QWebChannel === 'undefined') {
      console.warn('[archhub] QWebChannel unavailable — running in standalone mode');
      window.archhub = null;
      window.__archhub_ready = true;
      resolve(null);
      return;
    }
    new QWebChannel(qt.webChannelTransport, (channel) => {
      window.archhub = channel.objects.archhub;
      window.__archhub_ready = true;
      try {
        console.log('[archhub] bridge ready · version=' +
          (window.archhub.get_version ? window.archhub.get_version() : '?'));
      } catch (e) {}
      resolve(window.archhub);
    });
  });
  // Async bridge call. QWebChannel slots return a Promise (Qt 6) — the
  // raw value must be awaited before JSON.parse, or every pullAll() splice
  // silently no-ops on an unparsed Promise. Founder bug 2026-05-15.
  window.bridgeJson = async (slot, ...args) => {
    const b = await window.archhubReady;
    if (!b || typeof b[slot] !== 'function') return null;
    try {
      let raw = b[slot](...args);
      // QWebChannel slot invocation resolves asynchronously.
      if (raw && typeof raw.then === 'function') raw = await raw;
      if (typeof raw !== 'string') return raw;
      try { return JSON.parse(raw); } catch { return raw; }
    } catch (e) {
      console.warn('[archhub] bridgeJson(' + slot + ') failed:', e);
      return null;
    }
  };
</script>

<!-- AgDR-0026 Phase 1 — vendored React · production builds.
     Eliminates the CDN round-trip on cold start (was 1.5-3 s on slow
     WiFi + indefinitely on offline) AND uses react.production.min
     (~10 KB vs ~230 KB dev) + react-dom.production.min (~130 KB vs
     ~1.1 MB dev). React is always needed; load it eagerly. -->
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>

<!-- AgDR-0026 Phase 3 — babel.min.js is NO LONGER loaded here.  It was
     3 MB read+parsed on EVERY launch (even cache hits, where it went
     unused).  The boot loader now prefers the precompiled on-disk
     artifacts (studio-lm.compiled.js / app-boot.compiled.js, kept fresh
     by tools/build_jsx.py at launch) and loads them directly — no Babel.
     babel.min.js is lazily <script>-injected by jsx-boot.js ONLY when a
     precompiled artifact is missing or its sha doesn't match the live
     .jsx (the in-browser fallback path). -->

<!-- DESIGN-SYSTEM SoT — window.AH (single source of truth for every design
     token), loaded EAGERLY as plain JS BEFORE the bundle so it exists when
     studio-lm's IIFE runs.  THEMES.forge derives FROM window.AH (no hand-copied
     hexes) and LM.fs / LM.arch read the canonical type scale + architect's-hand
     face from here.  Pure assignment — no JSX — so it needs no Babel and adds
     no cold-start cost.  Mirror of _handoff/archhub/project/tokens.jsx. -->
<script src="tokens.jsx"></script>

<!-- AgDR-0026 Phase 3 — JSX boot loader.  Fast path: load the precompiled
     *.compiled.js when its embedded source-sha matches the live .jsx
     (no Babel, no localStorage, ~instant).  Fallback: lazy-load Babel +
     transpile in-browser + cache.  Boot order: studio-lm.jsx → app-boot.jsx. -->
<script src="jsx-boot.js"></script>
</body>
</html>
