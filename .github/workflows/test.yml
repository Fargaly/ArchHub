name: Tests

# Cross-platform test matrix. Runs the top-level `tests/` suite and the
# `cloud_backend/tests/` suite on Windows + macOS + Linux for every push
# to main and every pull request. Python 3.14 to match production.
#
# Win32 COM tests (Outlook) are skipped on macOS/Linux via
# `pytest.mark.skipif(sys.platform != 'win32', ...)` at the test module
# level — pywin32 is not installed on non-Windows runners.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same PR ref so we don't burn minutes on
# stale commits. `main` pushes use the SHA so each lands independently.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    # 30 (was 20): the windows runner is ~6x slower than macos/ubuntu on the
    # fs/subprocess-heavy cloud_backend suite and intermittently grazed the 20m
    # wall → the job was cancelled mid-run (a false red). macos/ubuntu finish
    # both suites in ~3m, so the extra margin only ever applies to a slow windows
    # runner; it never masks a real hang (a genuine deadlock still trips 30m).
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        # 3.13 pinned: PyO3 (pydantic-core's Rust core) caps at 3.13.
        # Local dev boxes can run 3.14; CI cannot until pydantic-core
        # ships against PyO3 0.23+. Bump alongside build-macos /
        # build-linux when that lands.
        python-version: ['3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # PyQt6 on Linux needs xcb + EGL system libs even for headless
      # tests — Qt resolves a platform plugin during QApplication init.
      - name: Install Qt6 runtime libs (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0 libegl1 \
            libfontconfig1 libdbus-1-3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            app/requirements.txt
            cloud_backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt -r cloud_backend/requirements.txt
          python -m pip install pytest pytest-asyncio

      # Offscreen platform lets PyQt6 init QApplication without a
      # display server — required for any test that imports a widget
      # at module load.
      #
      # IGNORE SET — must match the blessed local command in CLAUDE.md
      # (`pytest tests/ -q --ignore=tests/test_bridge_qt.py
      # --ignore=tests/test_ui_smoke.py`) AND daily-audit.yml. Previously
      # this step ran `pytest tests/ -v` with NO --ignore, so the required
      # gate executed a DIFFERENT set than the blessed dev command +
      # daily audit (REPO-MAP 2026-05-28 §8: "the required gate and the
      # blessed dev command test different sets"). The three are now aligned.
      #   * test_bridge_qt / test_ui_smoke — live Qt/WebEngine harnesses
      #     that need a real window; skipped headless (kept in the ignore
      #     set so the contract holds if they're reintroduced).
      #   * test_ui_cdp_smoke — the canonical CDP proof: it clicks the running
      #     app over CDP (port 9223). It is now COLLECTED + RUN here (no longer
      #     --ignore'd) so the proof is a live gate the moment a display is
      #     present; on a pure-headless runner with no display/GPU it SKIPS
      #     cleanly (a no-op, not a failure). It can also self-launch the app
      #     out of process when ARCHHUB_CDP_AUTOLAUNCH=1. CDP works on this
      #     QtWebEngine build once main.py appends --remote-allow-origins (the
      #     old "CDP handshake stalls" claim was a misdiagnosis).
      - name: Run app test suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: >-
          pytest tests/ -v
          --ignore=tests/test_bridge_qt.py
          --ignore=tests/test_ui_smoke.py

      - name: Run cloud backend test suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest cloud_backend/tests/ -v
