name: Build Linux

# Builds a Linux AppImage of ArchHub on every `v*.*.*` tag push.
#
# Strategy: PyInstaller `--onedir` output, staged into an AppDir
# (AppRun + .desktop + icon from packaging/linux/), then folded by
# `appimagetool` into a single self-contained `.AppImage`. AppImage is
# the de-facto Linux desktop-app format — one file, no install step,
# runs across distros.
#
# Build-host quirks handled here:
#   - GitHub's ubuntu runner ships no FUSE, so appimagetool (itself an
#     AppImage) is invoked with APPIMAGE_EXTRACT_AND_RUN=1.
#   - PyQt6 on Linux needs system `libxcb-*` + EGL libs at runtime; we
#     apt-install the minimal Qt platform deps so the PyInstaller
#     bundle has the .so files it expects.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # 3.13 because pydantic-core caps at Py 3.13 on its Rust
          # build. Bump alongside test.yml when PyO3 0.23+ lands in
          # the pydantic-core release chain.
          python-version: '3.13'
          cache: pip
          cache-dependency-path: app/requirements.txt

      # Qt6 needs xcb + EGL + a handful of font libs at runtime even when
      # we're only bundling, because PyInstaller copies the Qt platform
      # plugins it finds on the build host.
      - name: Install Qt6 runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0 libegl1 \
            libgl1 libfontconfig1 libdbus-1-3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt
          python -m pip install pyinstaller

      - name: Read version from VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --noconfirm \
            --onedir \
            --windowed \
            --name ArchHub \
            --collect-all PyQt6 \
            app/main.py

      # Post-build smoke (TCI-12). A bundle can build successfully yet crash on
      # first import/launch (a missing hidden import, a Qt plugin not collected,
      # a bad data-file path) and still ship as a release asset. Run the freshly
      # built binary in `--smoke` mode: it imports the whole app + constructs a
      # QApplication offscreen, then exits 0 BEFORE the event loop. A non-zero
      # exit or traceback fails the build here instead of in a user's hands.
      - name: Smoke-test the built bundle
        env:
          QT_QPA_PLATFORM: offscreen
          ARCHHUB_NO_SELF_HEAL: '1'
        run: |
          xvfb-run -a dist/ArchHub/ArchHub --smoke
          echo "build smoke passed (clean exit)"

      # Stage the PyInstaller --onedir bundle into an AppDir, then let
      # appimagetool fold it into a single .AppImage. AppRun + the
      # .desktop entry live in packaging/linux/ as committed files, so
      # this step is a plain copy — no fragile heredocs in YAML.
      - name: Build AppImage
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APPDIR="dist/ArchHub.AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"

          # The --onedir bundle: the ArchHub launcher + its _internal/
          # sibling. Copy the whole tree under usr/bin so the launcher
          # still finds _internal next to it.
          cp -r dist/ArchHub/. "$APPDIR/usr/bin/"

          cp packaging/linux/AppRun "$APPDIR/AppRun"
          cp packaging/linux/ArchHub.desktop "$APPDIR/ArchHub.desktop"
          chmod +x "$APPDIR/AppRun"

          # appimagetool wants <Icon>.png at the AppDir root, plus a
          # .DirIcon for file managers. archhub.png is the 256-px
          # ArchMark rendered by scripts/build_icon.py.
          cp app/assets/archhub.png "$APPDIR/archhub.png"
          cp app/assets/archhub.png "$APPDIR/.DirIcon"

          # appimagetool ships as an AppImage; the runner has no FUSE,
          # so extract-and-run it rather than mounting.
          curl -fsSL -o appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          export APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64
          ./appimagetool "$APPDIR" \
            "dist/ArchHub-${VERSION}-linux-x86_64.AppImage"
          ls -lh dist/*.AppImage

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ArchHub-Linux-AppImage
          path: dist/ArchHub-${{ steps.version.outputs.version }}-linux-x86_64.AppImage
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ArchHub-${{ steps.version.outputs.version }}-linux-x86_64.AppImage
          draft: false
          prerelease: false
