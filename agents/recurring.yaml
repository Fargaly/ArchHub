      "id": "docs-quickstart-audit",
      "department": "docs",
      "title": "Audit QUICKSTART.md against current Skills",
      "instructions": "Read QUICKSTART.md and the production seed Skills under app/skills/production_seeds.py (via the listed context files). For every Skill in production_seeds.py, confirm QUICKSTART has a recipe. Where it's missing, write the missing recipe in the QUICKSTART voice (terse, one prompt + expected outcome). Output: a fresh full QUICKSTART.md (Markdown) that incorporates any missing recipes. Do not invent skills not in the source.",
      "interval_minutes": 1440,
      "priority": 30,
      "inputs": {
        "context_files": [
          "QUICKSTART.md",
          "app/skills/production_seeds.py",
          "app/skills/seeds.py"
        ]
      }
    },
    {
      "id": "qa-skill-edges",
      "department": "qa",
      "title": "Generate edge-case test plan for production Skills",
      "instructions": "Read app/skills/production_seeds.py. For each Skill defined there, list 5 boundary cases and 3 failure modes, then suggest pytest test names (intent only, no implementations). Group by Skill. Total report under 800 words. Skip test bodies entirely.",
      "interval_minutes": 1440,
      "priority": 50,
      "inputs": {
        "context_files": [
