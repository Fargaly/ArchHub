# fly.toml app configuration file generated for archhub-agents on 2026-05-13T16:42:44+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'archhub-agents'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  ARCHHUB_AGENTS_BACKEND = 'anthropic'
  ARCHHUB_AGENTS_CYCLE = '60'
  ARCHHUB_AGENTS_DATA_ROOT = '/data/agents'
  # ENV intentionally unset until ANTHROPIC_API_KEY etc. are uploaded
  # as Fly secrets. Production mode raises on missing required keys.
  PORT = '8080'

[[mounts]]
  source = 'archhub_agents_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '1m0s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
