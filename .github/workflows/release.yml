name: Release

# Builds the ArchHub Windows installer and publishes it as a GitHub
# Release whenever a `v*.*.*` tag is pushed. End users with the
# release-based auto-updater inside ArchHub will then be offered the
# new build automatically.
#
# To cut a release locally:
#     git tag v0.11.0
#     git push origin v0.11.0
#
# The workflow:
#   1. Checks out the repo on a Windows runner.
#   2. Installs Python 3.11.
#   3. Installs Pillow (for PNG → ICO regeneration in case the icon was
#      missing) and PyInstaller (currently unused; the install bundles
#      Python source, but we keep PyInstaller available for a future
#      single-exe build).
#   4. Downloads + installs Inno Setup 6.
#   5. Compiles installer/setup.iss, which reads the version string out
#      of the VERSION file at compile time.
#   6. Signs the .exe via scripts/sign_installer.ps1 (no-op if no
#      signing config is present — see "Required secrets" below).
#   7. Uploads dist/ArchHub-Setup-*.exe as a Release asset.
#
# ── Required GitHub Actions secrets (all optional) ─────────────────
# Add these under Repo → Settings → Secrets and variables → Actions.
# If none are set, the build proceeds with an unsigned installer
# (still functional, just shows "Unknown Publisher" in SmartScreen).
#
# Path A — Azure Trusted Signing (preferred, $9/mo, no hardware token):
#   AZURE_TENANT_ID                       — Entra tenant GUID
#   AZURE_CLIENT_ID                       — service-principal app GUID
#   AZURE_CLIENT_SECRET                   — service-principal secret
#   AZURE_TRUSTED_SIGNING_ENDPOINT        — e.g. https://eus.codesigning.azure.net
#   AZURE_TRUSTED_SIGNING_ACCOUNT_NAME    — Trusted Signing account name
#   AZURE_TRUSTED_SIGNING_CERT_PROFILE    — certificate profile name
#
# Path B — Classic .pfx (Sectigo / SSL.com / DigiCert EV or OV):
#   ARCHHUB_SIGN_CERT_BASE64              — base64 of the .pfx file
#                                           (decoded into a temp file at
#                                            build time, see Sign step)
#   ARCHHUB_SIGN_CERT_PASSWORD            — .pfx password (omit if none)
#
# See docs/CODE_SIGNING.md for end-to-end setup of both paths.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: write           # needed for softprops/action-gh-release to publish

jobs:
  build-installer:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install Pillow pyinstaller

      # ── Build MCP connector DLLs in the cloud ─────────────────────
      # CI builds Revit/AutoCAD MCP binaries against NuGet-supplied
      # API references — no Autodesk install on the runner. Output
      # goes into payload/<family>/<year>/ which the installer then
      # bundles, AND is uploaded as a separate release asset so the
      # already-installed app can fetch a fresh build without re-
      # running the full Setup.
      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build MCP connectors (cloud)
        shell: pwsh
        run: |
          # Native-command stderr is fine here — dotnet writes NU1102
          # messages to stderr but we drive control via $LASTEXITCODE,
          # so don't let pwsh promote stderr lines into terminating
          # errors.
          $ErrorActionPreference = 'Continue'
          $PSNativeCommandUseErrorActionPreference = $false
          $repoRoot = $PWD.Path
          $payloadRoot = Join-Path $repoRoot 'payload'

          # `optional=$true` means a failure in this slot just gets
          # logged + skipped; the CI run still succeeds. We mark the
          # AutoCAD slots optional because Autodesk's NuGet feed is
          # less stable than the community Revit one — losing a CI
          # build is better than failing every release while we
          # iterate on the right package combo.
          $matrix = @(
            @{ family='revit';   year='2023'; tf='net48';          src='payload/sources/revit_mcp/RevitMCP.csproj'; optional=$false },
            @{ family='revit';   year='2024'; tf='net48';          src='payload/sources/revit_mcp/RevitMCP.csproj'; optional=$false },
            @{ family='revit';   year='2025'; tf='net8.0-windows'; src='payload/sources/revit_mcp/RevitMCP.csproj'; optional=$false },
            @{ family='autocad'; year='2025'; tf='net8.0-windows'; src='payload/sources/acad_mcp/AcadMCP.csproj';   optional=$true },
            @{ family='autocad'; year='2026'; tf='net8.0-windows'; src='payload/sources/acad_mcp/AcadMCP.csproj';   optional=$true }
          )

          foreach ($m in $matrix) {
            $out = Join-Path $payloadRoot "$($m.family)/$($m.year)"
            New-Item -ItemType Directory -Force -Path $out | Out-Null
            $yearProp = if ($m.family -eq 'revit') { "RevitYear=$($m.year)" } else { "AcadYear=$($m.year)" }
            Write-Host "::group::Build $($m.family) $($m.year) ($($m.tf))"
            dotnet restore $m.src "-p:TargetFramework=$($m.tf)" "-p:$yearProp"
            $restoreExit = $LASTEXITCODE
            if ($restoreExit -ne 0) {
              if ($m.optional) {
                Write-Warning "Restore failed (exit $restoreExit) for $($m.family) $($m.year) — optional, skipping."
                Remove-Item -Recurse -Force $out -ErrorAction SilentlyContinue
                $global:LASTEXITCODE = 0
                Write-Host "::endgroup::"
                continue
              }
              throw "Restore failed for $($m.family) $($m.year)"
            }
            dotnet build $m.src -c Release --no-restore "-p:TargetFramework=$($m.tf)" "-p:$yearProp" -o $out
            $buildExit = $LASTEXITCODE
            if ($buildExit -ne 0) {
              if ($m.optional) {
                Write-Warning "Build failed (exit $buildExit) for $($m.family) $($m.year) — optional, skipping."
                Remove-Item -Recurse -Force $out -ErrorAction SilentlyContinue
                $global:LASTEXITCODE = 0
                Write-Host "::endgroup::"
                continue
              }
              throw "Build failed for $($m.family) $($m.year)"
            }
            # Copy .addin manifest if it exists alongside the source.
            $addin = Join-Path $repoRoot "payload/sources/revit_mcp/RevitMCP.addin"
            if ($m.family -eq 'revit' -and (Test-Path $addin)) {
              Copy-Item $addin $out
            }
            # Strip Roslyn locale resources we never use to slim the zip.
            Get-ChildItem -Directory -Path $out |
              Where-Object { $_.Name -in 'cs','de','es','fr','it','ja','ko','pl','pt-BR','ru','tr','zh-Hans','zh-Hant' } |
              Remove-Item -Recurse -Force
            # Drop debug symbols from the artifact too — saves ~3 MB each.
            Get-ChildItem -Path $out -Filter '*.pdb' | Remove-Item -Force
            Write-Host "::endgroup::"
          }
          Write-Host "Built MCP DLLs:"
          Get-ChildItem -Recurse -Path $payloadRoot -Filter '*MCP.dll'

      - name: Pack MCP binaries (release asset)
        shell: pwsh
        run: |
          $zip = Join-Path 'dist' "ArchHub-MCP-Binaries.zip"
          New-Item -ItemType Directory -Force -Path 'dist' | Out-Null
          # Zip whichever family directories actually got built —
          # AutoCAD is optional and may be absent on a failed run.
          $paths = @()
          if (Test-Path 'payload/revit')   { $paths += 'payload/revit' }
          if (Test-Path 'payload/autocad') { $paths += 'payload/autocad' }
          if ($paths.Count -eq 0) { throw "No MCP binaries to pack." }
          Compress-Archive -Path $paths -DestinationPath $zip -Force
          Get-Item $zip | Select-Object FullName, Length

      - name: Regenerate ICO from PNG (in case it's stale)
        shell: pwsh
        run: |
          @'
          from PIL import Image
          from pathlib import Path
          src = Path("app/assets/archhub.png")
          dst = Path("app/assets/archhub.ico")
          if not src.exists():
              raise SystemExit(f"Missing {src}")
          img = Image.open(src)
          sizes = [(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)]
          img.save(dst, format="ICO", sizes=sizes)
          print("Wrote", dst)
          '@ | Out-File -FilePath "$env:RUNNER_TEMP\make_ico.py" -Encoding utf8
          python "$env:RUNNER_TEMP\make_ico.py"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          # Inno Setup direct download. The /download.php/is.exe redirector
          # serves the latest stable build.
          $url = "https://jrsoftware.org/download.php/is.exe"
          $installer = Join-Path $env:RUNNER_TEMP "innosetup.exe"
          Write-Host "Downloading Inno Setup from $url..."
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Write-Host "Installing silently..."
          $proc = Start-Process -FilePath $installer `
            -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/SP-","/NOICONS" `
            -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            throw "Inno Setup installer exited with code $($proc.ExitCode)"
          }
          # Discover ISCC.exe — Inno Setup 6 lands in Program Files (x86) on
          # x64 Windows, but we look on both paths for safety.
          $candidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            throw "ISCC.exe not found in any expected location"
          }
          Write-Host "Inno Setup compiler at: $iscc"
          # GITHUB_ENV requires KEY=VALUE lines; the value can contain spaces.
          Add-Content -Path $env:GITHUB_ENV -Value "ISCC=$iscc"

      - name: Compile installer
        shell: pwsh
        run: |
          & "$env:ISCC" "installer\setup.iss"

      - name: Find installer artifact
        id: find
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "dist" -Filter "ArchHub-Setup-*.exe" | Select-Object -First 1
          if (-not $exe) { throw "No ArchHub-Setup-*.exe produced" }
          "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($exe.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Built $($exe.FullName) ($([math]::Round($exe.Length/1MB,1)) MB)"

      # ── Code-signing (Authenticode) ─────────────────────────────────
      # Path selection is automatic in sign_installer.ps1: AZURE_TENANT_ID
      # picks Azure Trusted Signing, ARCHHUB_SIGN_CERT_PATH picks .pfx,
      # neither set = no-op (exit 0). For Path B, the .pfx itself is
      # delivered through a base64-encoded secret and reconstituted into
      # a temp file here so we never store binary blobs in the repo.
      - name: Sign installer
        shell: pwsh
        env:
          AZURE_TENANT_ID:                    ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:                    ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:                ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT:     ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERT_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          ARCHHUB_SIGN_CERT_BASE64:           ${{ secrets.ARCHHUB_SIGN_CERT_BASE64 }}
          ARCHHUB_SIGN_CERT_PASSWORD:         ${{ secrets.ARCHHUB_SIGN_CERT_PASSWORD }}
        run: |
          # If a base64-encoded .pfx is provided, materialize it on disk
          # and point ARCHHUB_SIGN_CERT_PATH at the temp file before
          # invoking the sign script. The path-selection logic in
          # sign_installer.ps1 keys off ARCHHUB_SIGN_CERT_PATH, so this
          # is what wires Path B to the workflow.
          if (-not [string]::IsNullOrWhiteSpace($env:ARCHHUB_SIGN_CERT_BASE64)) {
            $pfxPath = Join-Path $env:RUNNER_TEMP "archhub-signing.pfx"
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:ARCHHUB_SIGN_CERT_BASE64))
            # Make the path visible to subsequent steps in case anything
            # else wants it; also exported for the current step.
            $env:ARCHHUB_SIGN_CERT_PATH = $pfxPath
            Add-Content -Path $env:GITHUB_ENV -Value "ARCHHUB_SIGN_CERT_PATH=$pfxPath"
          }
          & "scripts\sign_installer.ps1" -InstallerPath "${{ steps.find.outputs.path }}"
          if ($LASTEXITCODE -ne 0) { throw "Signing failed (exit $LASTEXITCODE)" }

      - name: Verify signature
        shell: pwsh
        run: |
          # Verify only if signing was actually configured. We re-check
          # the same env vars sign_installer.ps1 uses for path selection;
          # if neither is set, `signtool verify` would fail with "no
          # signature was found", which is misleading in the unsigned
          # path-C case.
          $hasAzure = -not [string]::IsNullOrWhiteSpace('${{ secrets.AZURE_TENANT_ID }}')
          $hasPfx   = -not [string]::IsNullOrWhiteSpace('${{ secrets.ARCHHUB_SIGN_CERT_BASE64 }}')
          if (-not ($hasAzure -or $hasPfx)) {
            Write-Host "No signing secrets configured — skipping verify."
            return
          }
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found on runner." }
          & $signtool.FullName verify /pa /v "${{ steps.find.outputs.path }}"
          if ($LASTEXITCODE -ne 0) { throw "Signature verification failed (exit $LASTEXITCODE)" }

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ArchHub-Setup
          path: ${{ steps.find.outputs.path }}
          if-no-files-found: error

      - name: Upload MCP zip as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ArchHub-MCP-Binaries
          path: dist/ArchHub-MCP-Binaries.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.find.outputs.path }}
            dist/ArchHub-MCP-Binaries.zip
          name: ArchHub ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

      # ── Package-manager manifests ───────────────────────────────────
      # Compute SHA256 of the produced installer once and re-stamp every
      # manifest that needs it. Each manager has a different injection
      # path; the pattern below substitutes a known sentinel so we don't
      # accidentally rewrite other zeros in the file.
      - name: Stamp manifests with installer SHA256 + version
        if: startsWith(github.ref, 'refs/tags/')
        id: stamp
        shell: pwsh
        run: |
          $exe = '${{ steps.find.outputs.path }}'
          $hash = (Get-FileHash -Algorithm SHA256 -Path $exe).Hash.ToLower()
          $version = '${{ github.ref_name }}'.TrimStart('v')
          Write-Host "SHA256: $hash"
          Write-Host "Version: $version"
          "sha256=$hash"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          # winget — substitute the placeholder hash + version
          (Get-Content installer/winget/Fargaly.ArchHub.installer.yaml) `
            -replace '0{64}', $hash `
            -replace 'PackageVersion: 0\.16\.0', "PackageVersion: $version" `
            -replace '/v0\.16\.0/ArchHub-Setup-0\.16\.0\.exe', "/v$version/ArchHub-Setup-$version.exe" `
            | Set-Content installer/winget/Fargaly.ArchHub.installer.yaml

          (Get-Content installer/winget/Fargaly.ArchHub.locale.en-US.yaml) `
            -replace 'PackageVersion: 0\.16\.0', "PackageVersion: $version" `
            -replace '/tag/v0\.16\.0', "/tag/v$version" `
            | Set-Content installer/winget/Fargaly.ArchHub.locale.en-US.yaml

          (Get-Content installer/winget/Fargaly.ArchHub.yaml) `
            -replace 'PackageVersion: 0\.16\.0', "PackageVersion: $version" `
            | Set-Content installer/winget/Fargaly.ArchHub.yaml

          # scoop — version + URL
          (Get-Content installer/scoop/archhub.json) `
            -replace '"version": "0\.16\.0"', "`"version`": `"$version`"" `
            -replace '/v0\.16\.0/ArchHub-Setup-0\.16\.0\.exe', "/v$version/ArchHub-Setup-$version.exe" `
            | Set-Content installer/scoop/archhub.json

          # chocolatey — version, URL, sha256
          (Get-Content installer/chocolatey/archhub.nuspec) `
            -replace '<version>0\.16\.0</version>', "<version>$version</version>" `
            -replace 'tag/v0\.16\.0', "tag/v$version" `
            | Set-Content installer/chocolatey/archhub.nuspec

          (Get-Content installer/chocolatey/tools/chocolateyinstall.ps1) `
            -replace "version     = '0\.16\.0'", "version     = '$version'" `
            -replace '0{64}', $hash `
            | Set-Content installer/chocolatey/tools/chocolateyinstall.ps1

      - name: Upload manifests as release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: package-manifests
          path: |
            installer/winget/
            installer/scoop/
            installer/chocolatey/
          if-no-files-found: warn

      # winget submission — opens a PR to microsoft/winget-pkgs
      # automatically if WINGET_TOKEN is configured. If not, the
      # uploaded artifact above lets us submit manually post-release.
      - name: Submit to winget-pkgs
        if: startsWith(github.ref, 'refs/tags/') && env.WINGET_TOKEN != ''
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        shell: pwsh
        run: |
          # wingetcreate handles the PR-open dance: clone winget-pkgs,
          # validate the manifest, push to a fork, open a PR upstream.
          $url = "https://aka.ms/wingetcreate/latest"
          Invoke-WebRequest $url -OutFile wingetcreate.exe
          .\wingetcreate.exe submit installer/winget/ `
            --token $env:WINGET_TOKEN `
            --version ${{ steps.stamp.outputs.version }}
