name: Build macOS

# Builds a `.app` bundle + `.dmg` installer on every `v*.*.*` tag push
# and uploads it as a Release asset alongside the Windows installer.
#
# Best-effort: PyInstaller + PyQt6 on macOS sometimes needs extra
# `--collect-all PyQt6` / signing dance. If this job fails the Windows
# installer in release.yml still ships — the macOS asset is optional.
# When it works the user gets a drag-to-Applications DMG.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # softprops/action-gh-release needs this to upload

jobs:
  build-app:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # 3.13 because pydantic-core (via openai/anthropic SDKs) caps
          # at Py 3.13 on its Rust build. Bump alongside test.yml when
          # PyO3 upstream ships 3.14 support.
          python-version: '3.13'
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt
          python -m pip install pyinstaller

      - name: Read version from VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building ArchHub ${VERSION}"

      # `--windowed` produces a .app bundle (no Terminal window on launch).
      # `--onedir` is preferred over `--onefile` on macOS because Gatekeeper
      # validates the entire bundle once vs. extracting per-launch.
      # archhub.icns is generated by scripts/build_icon.py from the
      # ArchMark geometry and committed under app/assets/. The guard
      # below keeps the job resilient: if the file is ever missing,
      # PyInstaller still builds (Gatekeeper falls back to the default
      # Python icon) rather than failing the release.
      - name: Build .app with PyInstaller
        run: |
          ICON_FLAG=""
          if [ -f app/assets/archhub.icns ]; then
            ICON_FLAG="--icon app/assets/archhub.icns"
          fi
          pyinstaller \
            --noconfirm \
            --onedir \
            --windowed \
            --name ArchHub \
            --osx-bundle-identifier io.archhub.studio \
            $ICON_FLAG \
            --collect-all PyQt6 \
            app/main.py

      # Post-build smoke (TCI-12). A .app can build yet crash on first launch (a
      # missing hidden import / uncollected Qt plugin). Run the binary inside the
      # bundle in `--smoke` mode: it imports the whole app + constructs a
      # QApplication offscreen, then exits 0 before the event loop. A non-zero
      # exit / traceback fails the build here rather than shipping a broken .dmg.
      - name: Smoke-test the built bundle
        env:
          QT_QPA_PLATFORM: offscreen
          ARCHHUB_NO_SELF_HEAL: '1'
        run: |
          ./dist/ArchHub.app/Contents/MacOS/ArchHub --smoke
          echo "build smoke passed (clean exit)"

      # hdiutil ships with macOS — no extra deps. The DMG layout is
      # minimal (just the .app); a styled DMG with background image can
      # come later via create-dmg.
      - name: Package .app into .dmg
        run: |
          mkdir -p dist/dmg
          cp -R "dist/ArchHub.app" "dist/dmg/"
          ln -s /Applications "dist/dmg/Applications"
          hdiutil create \
            -volname "ArchHub ${{ steps.version.outputs.version }}" \
            -srcfolder "dist/dmg" \
            -ov \
            -format UDZO \
            "dist/ArchHub-${{ steps.version.outputs.version }}.dmg"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ArchHub-macOS-dmg
          path: dist/ArchHub-${{ steps.version.outputs.version }}.dmg
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ArchHub-${{ steps.version.outputs.version }}.dmg
          draft: false
          prerelease: false
