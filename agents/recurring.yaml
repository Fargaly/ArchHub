      "instructions": "We currently plan to vendor NodeGraphQt for the visual canvas (per docs/CANVAS_PLAN.md). Look at the candidates listed there + suggest one alternative that wasn't considered. Output a short memo: 1. What the proposed alternative is, 2. Why it might beat NodeGraphQt, 3. What it gives up. Stay under 500 words.",
      "interval_minutes": 10080,
      "priority": 70,
      "inputs": {
        "context_files": [
          "docs/CANVAS_PLAN.md",
          "STRATEGY.md"
        ]
      }
