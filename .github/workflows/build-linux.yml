name: Build Linux

# Builds a Linux distribution of ArchHub on every `v*.*.*` tag push.
#
# Strategy: PyInstaller `--onedir` output, then tar.gz it. This is the
# pragmatic floor — works reliably across distros without dealing with
# appimage-builder's apt-key + AppDir quirks. AppImage upgrade path
# (TODO): once we have a stable PyQt6 bundle, swap the tar step for
# `linuxdeploy` + `appimagetool`. Until then a tarball + a one-line
# install script gets the binary onto user machines.
#
# Best-effort: PyQt6 on Linux occasionally needs system `libxcb-*`
# libraries at runtime. We install the minimal Qt platform deps via
# apt so the PyInstaller bundle has the .so files it expects.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # 3.13 because pydantic-core caps at Py 3.13 on its Rust
          # build. Bump alongside test.yml when PyO3 0.23+ lands in
          # the pydantic-core release chain.
          python-version: '3.13'
          cache: pip
          cache-dependency-path: app/requirements.txt

      # Qt6 needs xcb + EGL + a handful of font libs at runtime even when
      # we're only bundling, because PyInstaller copies the Qt platform
      # plugins it finds on the build host.
      - name: Install Qt6 runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0 libegl1 \
            libgl1 libfontconfig1 libdbus-1-3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt
          python -m pip install pyinstaller

      - name: Read version from VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --noconfirm \
            --onedir \
            --windowed \
            --name ArchHub \
            --collect-all PyQt6 \
            app/main.py

      # Tarball the --onedir output. Users extract anywhere and run
      # ./ArchHub/ArchHub. We pick gzip over xz for portability; the
      # bundle is mostly already-compressed Python bytecode anyway.
      - name: Package as tar.gz
        run: |
          cd dist
          tar -czf "ArchHub-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz" ArchHub/
          ls -lh *.tar.gz

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ArchHub-Linux-tarball
          path: dist/ArchHub-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ArchHub-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz
          draft: false
          prerelease: false
