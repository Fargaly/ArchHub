# Dependabot — automatic vulnerability + version-pin updates.
#
# Three ecosystems we depend on:
#   - pip:        Python runtime deps for the desktop app
#   - github-actions: pinned action versions in our workflows
#   - nuget:      .NET / Roslyn deps inside the Revit MCP project
#
# Weekly cadence is enough; Dependabot still pushes immediate-fix PRs
# the moment a high-severity advisory lands, regardless of schedule.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/app"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(py)"
      include: "scope"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(py-root)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(ci)"

  - package-ecosystem: "nuget"
    directory: "/payload/sources/revit_mcp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(revit)"
